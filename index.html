<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1">
<meta name="theme-color" content="#10242e">
<title>Шарташ 1км · подготовка</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --ink:#10242e; --ink-2:#16323f; --paper:#f6f3ec; --paper-dim:#eae6da;
  --lane:#2f7d6b; --lane-dim:#7fada0; --signal:#e07a4f; --signal-dim:#f0b79a; --muted:#8a97a0;
}
*{box-sizing:border-box}
html{background:#10242e;height:100%}
html,body{margin:0;padding:0}
body{background:var(--ink);color:var(--paper);font-family:'IBM Plex Sans',sans-serif;min-height:100vh;min-height:100dvh;-webkit-font-smoothing:antialiased;}
.wrap{max-width:640px;margin:0 auto;padding:20px 18px 60px}

.brand{font-family:'Oswald',sans-serif;font-weight:600;font-size:13px;letter-spacing:0.14em;text-transform:uppercase;color:var(--signal-dim);margin-bottom:6px;text-align:center}
.brand b{color:var(--signal)}

.countdown{text-align:center;background:var(--ink-2);border-radius:12px;padding:14px;margin:14px 0 18px;border:1px solid rgba(224,122,79,0.25);}
.countdown .n{font-family:'Oswald',sans-serif;font-size:34px;font-weight:700;color:var(--signal);line-height:1}
.countdown .l{font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;margin-top:4px}

.datepick{display:flex;align-items:center;justify-content:center;gap:10px;margin:14px 0 18px}
.datepick button{background:var(--signal);border:1px solid var(--signal);color:#fff;width:40px;height:40px;border-radius:10px;cursor:pointer;font-size:20px;line-height:1;display:flex;align-items:center;justify-content:center;flex:none;}
.datepick button:active{background:var(--signal-dim)}
.datepick .datelabel{font-family:'IBM Plex Mono',monospace;font-size:15px;color:var(--signal-dim);font-weight:600;min-width:110px;text-align:center}

.todaybtn{display:block;margin:0 auto 20px;background:none;border:none;color:var(--lane-dim);font-family:'IBM Plex Mono',monospace;font-size:11px;text-transform:uppercase;letter-spacing:.05em;cursor:pointer;text-decoration:underline;padding:4px 0;}

.headline{margin-bottom:20px;text-align:center}
.headline .date{font-family:'IBM Plex Mono',monospace;font-size:12px;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;margin-bottom:8px}
.headline h1{font-family:'Oswald',sans-serif;font-weight:700;font-size:26px;margin:0;line-height:1.25;word-wrap:break-word;color:#c8552f;letter-spacing:.01em}
.badge{display:inline-block;margin-top:12px;padding:6px 16px;border-radius:20px;font-family:'IBM Plex Mono',monospace;font-size:12px;letter-spacing:.03em;text-transform:uppercase;white-space:nowrap;}
.badge.swim{background:rgba(47,125,107,0.25);color:#8fd6c1}
.badge.long{background:#2f7d6b;color:#ffffff;font-weight:700}
.badge.pace{background:rgba(139,159,236,0.2);color:#aebdf5}
.badge.rest{background:rgba(138,151,160,0.2);color:var(--muted)}
.badge.race{background:#e07a4f;color:#fff;font-weight:700}

.card{background:var(--paper);color:var(--ink);border-radius:14px;padding:20px;margin-bottom:14px;}
.card h3{font-family:'Oswald',sans-serif;font-weight:500;font-size:15px;text-transform:uppercase;letter-spacing:.06em;margin:0 0 10px;color:var(--ink-2);display:flex;align-items:center;gap:8px;}
.card h3::before{content:'';width:7px;height:7px;border-radius:50%;background:var(--lane);flex:none}
.steps{display:flex;flex-direction:column;gap:6px}
.steps .line{font-size:15px;color:#3a4a50;line-height:1.5;padding-left:14px;position:relative}
.steps .line::before{content:'';position:absolute;left:0;top:9px;width:5px;height:5px;border-radius:50%;background:var(--lane)}

.restcard{background:var(--paper);color:var(--ink);border-radius:14px;padding:40px 20px;text-align:center;margin-bottom:14px}
.restcard .icon{font-size:32px;margin-bottom:10px}
.restcard h3{font-family:'Oswald',sans-serif;font-size:20px;margin:0 0 6px}
.restcard p{color:#6b7a80;font-size:14px;margin:0}

.racecard{background:linear-gradient(135deg,#e07a4f,#c8552f);color:#fff;border-radius:14px;padding:32px 20px;text-align:center;margin-bottom:14px}
.racecard .icon{font-size:36px;margin-bottom:10px}
.racecard h3{font-family:'Oswald',sans-serif;font-size:24px;margin:0 0 8px}
.racecard p{font-size:14px;margin:0;opacity:.95;line-height:1.5}

.notescard{background:var(--paper);color:var(--ink);border-radius:14px;padding:20px;margin-top:20px}
.notescard h3{font-family:'Oswald',sans-serif;font-weight:500;font-size:15px;text-transform:uppercase;letter-spacing:.06em;margin:0 0 12px;color:var(--ink-2)}
.notescard textarea{width:100%;min-height:70px;border:1px solid rgba(16,36,46,0.15);border-radius:8px;padding:10px;font-family:'IBM Plex Sans',sans-serif;font-size:15px;resize:vertical;margin-bottom:10px}
.notescard .row2{display:flex;gap:10px;margin-bottom:10px}
.notescard .row2 input{flex:1;border:1px solid rgba(16,36,46,0.15);border-radius:8px;padding:10px;font-family:'IBM Plex Mono',monospace;font-size:15px}
.notescard .row2 label{display:block;font-size:11px;color:#8a97a0;margin-bottom:4px;font-family:'IBM Plex Mono',monospace;text-transform:uppercase}
.sendbtn{width:100%;border:none;border-radius:10px;padding:14px;background:var(--signal);color:#fff;font-family:'Oswald',sans-serif;font-weight:600;font-size:14px;text-transform:uppercase;letter-spacing:.05em;cursor:pointer}
.sendbtn:active{opacity:.85}
.sendbtn:disabled{opacity:.5}

.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--lane);color:#fff;padding:10px 18px;border-radius:8px;font-size:13px;opacity:0;transition:all .25s;pointer-events:none;z-index:50;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.toast.err{background:#c96a54}

.loading{text-align:center;padding:40px;color:var(--muted);font-family:'IBM Plex Mono',monospace;font-size:13px}
</style>
</head>
<body>
<div class="wrap">
  <div class="brand">Подготовка · <b>Шарташ 1км</b></div>
  <div class="countdown"><div class="n" id="countdownN">—</div><div class="l" id="countdownL">до старта</div></div>
  <div class="datepick">
    <button id="prevDay">‹</button>
    <span class="datelabel" id="dateLabel">—</span>
    <button id="nextDay">›</button>
  </div>
  <button class="todaybtn" id="todayBtn">Сегодня</button>

  <div class="headline">
    <div class="date" id="cycleLabel">—</div>
    <h1 id="dayTitle">Загрузка…</h1>
    <span class="badge" id="dayBadge" style="display:none"></span>
  </div>

  <div id="blocks"></div>

  <div class="notescard">
    <h3>Заметки по тренировке</h3>
    <textarea id="notesInput" placeholder="Что получилось: время, сплиты, самочувствие..."></textarea>
    <div class="row2">
      <div style="flex:1"><label>RPE (1-10)</label><input type="number" id="rpeInput" min="1" max="10"></div>
      <div style="flex:1"><label>Вес, кг</label><input type="number" step="0.1" id="weightInput"></div>
    </div>
    <button class="sendbtn" id="sendBtn">Отправить</button>
  </div>

  <div class="toast" id="toast"></div>
</div>

<script>
(function(){

var SUPABASE_URL = 'https://ifgauvvbxtjwefuhtwfl.supabase.co';
var SUPABASE_KEY = 'sb_publishable_n3m3-xBSOpGbX3kJS6msEg_hSpP8agK';
var RACE_DATE = '2026-07-25';

var headers = {
  'apikey': SUPABASE_KEY,
  'Content-Type': 'application/json'
};

var WD_FULL = ['воскресенье','понедельник','вторник','среда','четверг','пятница','суббота'];
var BADGE_LABEL = {swim:'плавание', long:'длинная', pace:'темп', rest:'отдых', race:'старт'};

function dstr(d){
  var y=d.getFullYear(), m=String(d.getMonth()+1).padStart(2,'0'), day=String(d.getDate()).padStart(2,'0');
  return y+'-'+m+'-'+day;
}
function fmtDate(d){
  var day=String(d.getDate()).padStart(2,'0'), m=String(d.getMonth()+1).padStart(2,'0');
  return day+'.'+m+'.'+d.getFullYear();
}

var current = new Date();

function updateCountdown(){
  var race = new Date(RACE_DATE+'T00:00:00');
  var today = new Date(); today.setHours(0,0,0,0);
  var diff = Math.round((race-today)/86400000);
  var n = document.getElementById('countdownN');
  var l = document.getElementById('countdownL');
  if(diff > 0){ n.textContent = diff; l.textContent = diff===1?'день до старта':'дней до старта'; }
  else if(diff === 0){ n.textContent = '🏁'; l.textContent = 'сегодня старт!'; }
  else { n.textContent = '✓'; l.textContent = 'заплыв позади'; }
}

function showToast(msg, isErr){
  var t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast show' + (isErr?' err':'');
  setTimeout(function(){ t.classList.remove('show'); }, 2200);
}

async function fetchDay(){
  var key = dstr(current);
  document.getElementById('dateLabel').textContent = fmtDate(current);
  document.getElementById('cycleLabel').textContent = WD_FULL[current.getDay()];
  document.getElementById('dayTitle').textContent = 'Загрузка…';
  document.getElementById('dayBadge').style.display = 'none';
  document.getElementById('blocks').innerHTML = '<div class="loading">Загружаю из Supabase…</div>';

  try{
    var res = await fetch(SUPABASE_URL + '/rest/v1/program?date=eq.' + key + '&select=*', { headers: headers });
    var bodyText = await res.text();
    if(!res.ok) throw new Error('HTTP ' + res.status + ': ' + bodyText.slice(0,200));
    var rows = JSON.parse(bodyText);
    var blocksEl = document.getElementById('blocks');
    blocksEl.innerHTML = '';

    if(rows.length === 0){
      document.getElementById('dayTitle').textContent = 'Нет данных';
      blocksEl.innerHTML = '<div class="restcard"><div class="icon">🗓️</div><h3>Программа не задана</h3><p>На эту дату записи в базе нет</p></div>';
      return;
    }

    var def = rows[0];
    document.getElementById('dayTitle').textContent = def.title;
    var b = document.getElementById('dayBadge');
    b.style.display = '';
    b.textContent = BADGE_LABEL[def.badge] || def.badge;
    b.className = 'badge ' + def.badge;

    if(def.badge === 'race'){
      blocksEl.innerHTML = '<div class="racecard"><div class="icon">🏁</div><h3>Старт заплыва</h3><p>'+(def.note||'')+'</p></div>';
      return;
    }
    if(def.is_rest){
      blocksEl.innerHTML = '<div class="restcard"><div class="icon">🌊</div><h3>День отдыха</h3><p>'+(def.note||'')+'</p></div>';
      return;
    }

    (def.blocks || []).forEach(function(bl){
      var card = document.createElement('div');
      card.className = 'card';
      var lines = bl.text.split(' — ').map(function(s){ return '<span class="line">'+s+'</span>'; }).join('');
      card.innerHTML = '<h3>'+bl.label+'</h3><div class="steps">'+lines+'</div>';
      blocksEl.appendChild(card);
    });
  }catch(e){
    document.getElementById('dayTitle').textContent = 'Ошибка загрузки';
    document.getElementById('blocks').innerHTML = '<div class="restcard"><div class="icon">⚠️</div><h3>Не удалось связаться с Supabase</h3><p style="word-break:break-all;font-family:monospace;font-size:12px">'+(e.message||String(e))+'</p></div>';
  }
}

document.getElementById('prevDay').addEventListener('click', function(){ current.setDate(current.getDate()-1); fetchDay(); });
document.getElementById('nextDay').addEventListener('click', function(){ current.setDate(current.getDate()+1); fetchDay(); });
document.getElementById('todayBtn').addEventListener('click', function(){ current = new Date(); fetchDay(); });

document.getElementById('sendBtn').addEventListener('click', async function(){
  var notes = document.getElementById('notesInput').value.trim();
  var rpe = document.getElementById('rpeInput').value;
  var weight = document.getElementById('weightInput').value;
  if(!notes && !rpe && !weight){ showToast('Заполни хотя бы одно поле', true); return; }

  var btn = document.getElementById('sendBtn');
  btn.disabled = true;
  try{
    var res = await fetch(SUPABASE_URL + '/rest/v1/logs', {
      method: 'POST',
      headers: Object.assign({}, headers, {'Prefer':'return=minimal'}),
      body: JSON.stringify({
        date: dstr(current),
        notes: notes || null,
        rpe: rpe ? parseInt(rpe) : null,
        weight: weight ? parseFloat(weight) : null
      })
    });
    if(!res.ok) throw new Error('http '+res.status);
    showToast('Отправлено');
    document.getElementById('notesInput').value = '';
    document.getElementById('rpeInput').value = '';
    document.getElementById('weightInput').value = '';
  }catch(e){
    showToast('Ошибка отправки', true);
  }
  btn.disabled = false;
});

updateCountdown();
fetchDay();
})();
</script>
</body>
</html>
